<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>汉字的演变 · The Evolution of Chinese Characters</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- 网页图标：朱红印章里的“文” / favicon: 文 in a vermilion seal -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='10' width='80' height='80' rx='12' fill='%232F6E63'/><text x='50' y='50' font-size='56' font-family='serif' fill='%23EAECE6' text-anchor='middle' dominant-baseline='central'>文</text></svg>" />
</head>
<body>

  <!-- ============================================================
       顶部：语言切换按钮（固定在右上角）
       Top bar: language toggle (fixed, top-right)
       ============================================================ -->
  <button id="lang-toggle" class="lang-toggle" aria-label="切换语言 / Switch language">
    <span id="lang-label">中 / EN</span>
  </button>

  <!-- ============================================================
       视图 1：首页 / View 1: Home
       ============================================================ -->
  <section id="view-home" class="view active">
    <div class="home-inner">
      <!-- 主视觉：一道水墨笔触 + 一枚朱红印章 / ink brushstroke + a vermilion seal -->
      <div class="mascot" aria-hidden="true">
        <svg viewBox="0 0 200 200" class="mascot-svg">
          <!-- 水墨笔触（自上而下的一笔）/ a single ink brushstroke -->
          <path d="M86 24 C 78 60, 96 92, 84 132 C 79 150, 86 164, 100 172"
                fill="none" stroke="#20251F" stroke-width="9"
                stroke-linecap="round" opacity="0.92"/>
          <path d="M88 30 C 100 70, 80 104, 96 150"
                fill="none" stroke="#20251F" stroke-width="3.5"
                stroke-linecap="round" opacity="0.35"/>
          <!-- 铜绿印章：里面一个“文” / patina-bronze seal containing 文 -->
          <rect x="116" y="116" width="60" height="60" rx="10" fill="#2F6E63"/>
          <text x="146" y="148" font-family="Noto Serif SC, Songti SC, serif"
                font-size="40" fill="#EAECE6" text-anchor="middle"
                dominant-baseline="central">文</text>
        </svg>
      </div>

      <h1 class="home-title">
        <span data-i18n="home_title">甲骨文的世界</span>
      </h1>

      <p class="home-sub" data-i18n="home_sub">三千多年前，中国最早的文字刻在龟甲和兽骨上。它们像一幅幅小图画——一起来认识它。</p>

      <!-- 板块导航卡片（JS 生成）/ section cards (generated by JS) -->
      <div id="section-board" class="section-board"></div>
    </div>
  </section>

  <!-- ============================================================
       视图 2：汉字网格 / View 2: Character grid
       ============================================================ -->
  <section id="view-grid" class="view">
    <button class="back-btn" data-go="home">← <span data-i18n="back_home">回首页 Home</span></button>
    <h2 class="grid-title" data-i18n="grid_title">选择一个汉字<br>Choose a character</h2>
    <!-- 网格由 JS 自动生成 / grid is generated by JS -->
    <div id="char-grid" class="char-grid"></div>
  </section>

  <!-- ============================================================
       视图 3：单个字的演变详情 / View 3: Character detail
       ============================================================ -->
  <section id="view-detail" class="view">
    <button class="back-btn" data-go="grid">← <span data-i18n="back_grid">所有字 All</span></button>

    <div class="detail-head">
      <span id="d-pinyin" class="d-pinyin"></span>
      <span id="d-meaning" class="d-meaning"></span>
    </div>

    <!-- 演变动画舞台 / morphing stage -->
    <div id="stage-wrap" class="stage-wrap">
      <svg id="glyph-svg" viewBox="0 0 100 100" aria-label="汉字演变 character morphing">
        <!-- 装饰（如太阳的光芒），随进度淡出 / decorations (e.g. sun rays), fade out -->
        <g id="glyph-decor"></g>
        <!--
          所有阶段都在这一层里用「逐点形变」画出来：
          每一笔被重新采样成等距的点，相邻阶段的笔画按最近距离配对后逐点插值，
          所以从实物一路到楷书，笔画都是真正地“移动 / 变形”，而不是淡入淡出。
          Every stage is drawn here with point-based morphing: each stroke is
          resampled to evenly-spaced points, strokes of neighbouring stages are
          paired by nearest distance, then interpolated point-by-point — so the
          strokes truly move/bend from one form to the next (no cross-fade).
        -->
        <g id="glyph-strokes" fill="none" stroke-linejoin="round" stroke-linecap="round"></g>
      </svg>
      <div class="tap-hint" id="tap-hint"><span data-i18n="tap_hint">点击或拖动，查看演变 · Tap or drag to explore</span></div>
    </div>

    <!-- 四个阶段的时间轴（JS 生成节点） / 4-stage timeline -->
    <div id="timeline" class="timeline"></div>

    <!-- 拖动滑块也能慢慢变 / drag to morph slowly -->
    <input id="stage-slider" class="stage-slider" type="range" min="0" max="3" step="0.01" value="0" aria-label="拖动看演变 slide to morph" />

    <!-- 大白话说明（双语） / short bilingual caption -->
    <div id="d-caption" class="d-caption"></div>

    <!-- 上一步 / 下一步 -->
    <div class="step-nav">
      <button id="prev-stage" class="round-btn" aria-label="上一步 previous">◀</button>
      <button id="next-stage" class="round-btn" aria-label="下一步 next">▶</button>
    </div>

    <!-- 小知识 / fun fact -->
    <div id="d-fact" class="d-fact"></div>

    <!-- 占位说明（只在未完成的字上显示） / placeholder note -->
    <div id="detail-placeholder" class="detail-placeholder" hidden></div>

    <button id="next-char" class="big-btn next-char-btn">
      <span data-i18n="next_char">下一个字　Next character ➡</span>
    </button>
  </section>

  <!-- ============================================================
       视图 4：猜一猜甲骨文（识字游戏）/ View 4: Guess the Oracle (game)
       ============================================================ -->
  <section id="view-quiz" class="view">
    <button class="back-btn" data-go="home">← <span data-i18n="back_home">回首页 Home</span></button>

    <!-- 出题区 / question area -->
    <div id="quiz-play">
      <div class="quiz-head">
        <span id="quiz-progress" class="quiz-progress"></span>
        <span id="quiz-score" class="quiz-score"></span>
      </div>

      <p class="quiz-prompt" data-i18n="quiz_prompt">这是哪个字？ · Which character is this?</p>

      <!-- 甲骨文字形（画框）/ oracle glyph in a frame -->
      <div class="quiz-stage">
        <svg id="quiz-svg" viewBox="0 0 100 100" aria-label="甲骨文字形 oracle glyph">
          <g id="quiz-glyph" fill="none" stroke="#20251F" stroke-linejoin="round" stroke-linecap="round"></g>
        </svg>
      </div>

      <!-- 选项（JS 生成）/ options (generated by JS) -->
      <div id="quiz-options" class="quiz-options"></div>

      <!-- 答对后的反馈 / feedback after a correct answer -->
      <div id="quiz-feedback" class="quiz-feedback"></div>
      <button id="quiz-next" class="big-btn" hidden>
        <span data-i18n="quiz_next">下一题　Next</span>
      </button>
    </div>

    <!-- 结算区 / result screen -->
    <div id="quiz-result" class="quiz-result" hidden></div>
  </section>

  <!-- ============================================================
       视图 5：什么是甲骨文（图文科普）/ View 5: What Are Oracle Bones?
       ============================================================ -->
  <section id="view-about" class="view">
    <button class="back-btn" data-go="home">← <span data-i18n="back_home">回首页 Home</span></button>
    <h2 class="about-title" id="about-title"></h2>
    <!-- 图文面板由 JS 生成 / panels generated by JS -->
    <div id="about-panels" class="about-panels"></div>
    <div class="about-foot">
      <button id="about-cta" class="big-btn" data-go="quiz"></button>
    </div>
  </section>

  <!-- ============================================================
       视图 6：甲骨文拼图 / View 6: Oracle jigsaw
       ============================================================ -->
  <section id="view-puzzle" class="view">
    <button class="back-btn" data-go="home">← <span data-i18n="back_home">回首页 Home</span></button>
    <p class="puzzle-prompt" data-i18n="puzzle_prompt">把甲骨文拼好 · Put the oracle glyph back together</p>
    <div id="puzzle-target" class="puzzle-target"></div>
    <!-- 拼图格子由 JS 生成 / tiles generated by JS -->
    <div id="puzzle-board" class="puzzle-board"></div>
    <div id="puzzle-feedback" class="puzzle-feedback"></div>
    <div class="puzzle-actions">
      <button id="puzzle-shuffle" class="round-btn" aria-label="打乱 shuffle">↻</button>
      <button id="puzzle-new" class="big-btn"></button>
    </div>
  </section>

  <!-- 隐藏的测量用 SVG（始终渲染，供形变引擎与拼图取点用）
       hidden measure SVG (always rendered) for path sampling -->
  <svg id="measure-svg" width="0" height="0" style="position:absolute;left:-9999px" aria-hidden="true">
    <path id="measure-path"></path>
  </svg>

  <script src="script.js"></script>
</body>
</html>
